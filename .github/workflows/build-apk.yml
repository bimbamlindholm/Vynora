name: Build and Deploy Android APK

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Compile Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Copy APK to Public Directory
        run: |
          mkdir -p public
          cp android/app/build/outputs/apk/debug/app-debug.apk public/vynora.apk

      - name: Commit and Push APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vynora.apk
          if git diff --staged --quiet; then
            echo "No changes in APK detected."
          else
            git commit -m "build: compile and update native android APK [skip ci]"
            git push origin main
          fi
